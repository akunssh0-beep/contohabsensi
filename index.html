<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masook Puskesmas AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; user-select: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-top: 1px solid #e2e8f0; }
        .action-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-card:active { transform: scale(0.95); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center bg-white shadow-sm">
        <div>
            <h1 class="font-black text-slate-800 text-2xl tracking-tighter italic uppercase">Masook AI</h1>
            <div id="gps-indicator" class="flex items-center gap-1.5 mt-1">
                <div id="gps-dot" class="w-2 h-2 bg-slate-300 rounded-full animate-pulse"></div>
                <span id="gps-text" class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Validasi Lokasi...</span>
            </div>
        </div>
        <button onclick="window.location.href='profil.html'" class="w-12 h-12 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center text-xl active:scale-90 transition-all">👤</button>
    </header>

    <main class="flex flex-col items-center px-6 mt-8">
        <div class="w-full max-w-sm bg-white p-8 rounded-[3rem] shadow-xl shadow-slate-200/50 border border-slate-50 text-center mb-8">
            <div class="relative w-24 h-24 mx-auto mb-4">
                <div id="user-avatar" class="w-full h-full bg-slate-100 rounded-full flex items-center justify-center text-4xl overflow-hidden border-4 border-white shadow-inner">
                    <img id="img-profile" src="" class="hidden w-full h-full object-cover">
                    <span id="icon-placeholder">👤</span>
                </div>
                <div id="verify-badge" class="hidden absolute -bottom-1 -right-1 bg-green-500 w-8 h-8 rounded-full border-4 border-white flex items-center justify-center text-[10px] text-white">✓</div>
            </div>
            
            <h2 id="display-name" class="font-black text-slate-800 text-xl tracking-tighter uppercase italic">Siap Memulai?</h2>
            <p id="display-nip" class="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] mt-1">Gunakan Scan Wajah</p>
            
            <button onclick="window.location.href='scan.html'" class="mt-8 w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-100 active:scale-95 transition-all">
                Buka Kamera AI
            </button>
        </div>

        <div class="w-full max-w-sm grid grid-cols-2 gap-4">
            <button onclick="prosesAbsen('MASUK')" id="btn-masuk" disabled class="action-card bg-slate-100 text-slate-300 p-6 rounded-[2.5rem] opacity-50 cursor-not-allowed">
                <p class="font-black text-[9px] uppercase tracking-widest">Absen</p>
                <h4 class="font-black text-xl italic uppercase">Masuk</h4>
            </button>
            <button onclick="prosesAbsen('PULANG')" id="btn-pulang" disabled class="action-card bg-slate-100 text-slate-300 p-6 rounded-[2.5rem] opacity-50 cursor-not-allowed">
                <p class="font-black text-[9px] uppercase tracking-widest">Absen</p>
                <h4 class="font-black text-xl italic uppercase">Pulang</h4>
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav p-5 flex justify-around items-center z-50 shadow-2xl">
        <button onclick="window.location.reload()" class="flex flex-col items-center gap-1">
            <span class="text-xl">🏠</span>
            <span class="text-[8px] font-black uppercase text-blue-600">Beranda</span>
        </button>
        <button onclick="window.location.href='daftarpetugas.html'" class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-xl">👥</span>
            <span class="text-[8px] font-black uppercase">Petugas</span>
        </button>
        <button onclick="window.location.href='rekapan.html'" class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-xl">📊</span>
            <span class="text-[8px] font-black uppercase">Rekap</span>
        </button>
        <button onclick="window.location.href='dasbodadmin.html'" class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-xl">⚙️</span>
            <span class="text-[8px] font-black uppercase">Admin</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";
        
        // Lokasi Puskesmas Sampanahan
        const PKM_LOCATION = { lat: -2.637022, lng: 116.203674 };
        
        let config = JSON.parse(localStorage.getItem('masook_config')) || { gpsEnabled: true, radius: 50 };
        let isLocationValid = false;
        let currentUser = null;

        window.onload = () => {
            initGPS();
            checkScannedUser();
        };

        function initGPS() {
            if (!config.gpsEnabled) {
                isLocationValid = true;
                updateGPSUI(true, "GPS Bypass (OFF)");
                return;
            }

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, PKM_LOCATION.lat, PKM_LOCATION.lng);
                    if (dist <= config.radius) {
                        isLocationValid = true;
                        updateGPSUI(true, "Dalam Area Puskesmas");
                    } else {
                        isLocationValid = false;
                        updateGPSUI(false, "Luar Radius Kantor");
                    }
                }, err => updateGPSUI(false, "GPS Tidak Aktif"), { enableHighAccuracy: true });
            }
        }

        function updateGPSUI(isValid, text) {
            const dot = document.getElementById('gps-dot');
            const txt = document.getElementById('gps-text');
            dot.className = isValid ? "w-2 h-2 bg-green-500 rounded-full" : "w-2 h-2 bg-red-500 rounded-full";
            txt.innerText = text;
            txt.className = isValid ? "text-[9px] font-black text-green-600 uppercase tracking-widest" : "text-[9px] font-black text-red-600 uppercase tracking-widest";
            checkReadyState();
        }

        function checkScannedUser() {
            const result = localStorage.getItem('scanned_user');
            if (result) {
                currentUser = JSON.parse(result);
                document.getElementById('display-name').innerText = currentUser.nama;
                document.getElementById('display-nip').innerText = "NIP: " + currentUser.nip;
                document.getElementById('verify-badge').classList.remove('hidden');
                
                if (currentUser.foto) {
                    const img = document.getElementById('img-profile');
                    img.src = currentUser.foto;
                    img.classList.remove('hidden');
                    document.getElementById('icon-placeholder').classList.add('hidden');
                }
                checkReadyState();
            }
        }

        function checkReadyState() {
            if (isLocationValid && currentUser) {
                const btnM = document.getElementById('btn-masuk');
                const btnP = document.getElementById('btn-pulang');
                
                btnM.disabled = false;
                btnM.className = "action-card bg-blue-600 text-white p-6 rounded-[2.5rem] shadow-xl shadow-blue-100 active:scale-95 transition-all";
                
                btnP.disabled = false;
                btnP.className = "action-card bg-slate-800 text-white p-6 rounded-[2.5rem] shadow-xl shadow-slate-100 active:scale-95 transition-all";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function prosesAbsen(tipe) {
            if (!currentUser) return;
            alert(`Berhasil: Presensi ${tipe} tercatat untuk ${currentUser.nama}`);
            localStorage.removeItem('scanned_user');
            window.location.reload();
        }
    </script>
</body>
</html>
