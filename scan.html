<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scanner - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; overflow: hidden; }
        .cam-frame { width: 280px; height: 280px; border-radius: 50%; border: 4px solid #3b82f6; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(59, 130, 246, 0.4); }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #22c55e; box-shadow: 0 0 20px #22c55e; animation: move 2.5s infinite ease-in-out; z-index: 10; }
        @keyframes move { 0%, 100% { top: 0%; } 50% { top: 100%; } }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div id="camera-section">
        <h1 class="text-white font-black text-2xl uppercase tracking-tighter italic mb-2">AI Face Scanner</h1>
        <p id="status-text" class="text-blue-400 text-[9px] font-black uppercase tracking-[0.3em] mb-10">Mempersiapkan Sensor...</p>

        <div id="scanner-container" class="cam-frame mx-auto mb-10">
            <div class="scan-line"></div>
            <video id="video" autoplay muted playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
        </div>

        <button onclick="window.location.href='index.html'" class="text-white/30 font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">Batalkan</button>
    </div>

    <div id="verify-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-8">
        <div class="animate-pulse">
            <div class="w-24 h-24 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-8"></div>
            <h2 class="text-white font-black text-2xl uppercase italic tracking-tighter">Memverifikasi ID</h2>
            <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.4em] mt-4 italic">Mencocokkan Database it.barokah.net...</p>
            <div class="w-48 h-1 bg-white/10 rounded-full mx-auto mt-8 overflow-hidden">
                <div class="h-full bg-blue-600 animate-[progress_2s_linear]"></div>
            </div>
        </div>
    </div>

    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";
    let stream;
    let labeledDescriptors = [];
    let userData = [];

    // Load Models & Data
    Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
    ]).then(fetchUsers);

    async function fetchUsers() {
        try {
            const response = await fetch(API_URL + "?action=get_users");
            userData = await response.json();
            
            labeledDescriptors = await Promise.all(
                userData.map(async user => {
                    if (!user.descriptor) return null;
                    const descriptions = [new Float32Array(Object.values(user.descriptor))];
                    return new faceapi.LabeledFaceDescriptors(user.nip.toString(), descriptions);
                })
            );
            labeledDescriptors = labeledDescriptors.filter(d => d !== null);
            startVideo();
        } catch (e) {
            alert("Gagal koneksi ke database it.barokah.net");
        }
    }

    async function startVideo() {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
        detectFace();
    }

    async function detectFace() {
        const video = document.getElementById('video');
        const statusText = document.querySelector('.scan-status'); // Pastikan ada elemen status

        const interval = setInterval(async () => {
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();

            if (detection && labeledDescriptors.length > 0) {
                const match = new faceapi.FaceMatcher(labeledDescriptors, 0.45).findBestMatch(detection.descriptor);
                
                if (match.label !== 'unknown') {
                    clearInterval(interval);
                    
                    // 1. Ambil data user
                    const user = userData.find(u => u.nip.toString() === match.label);
                    
                    // 2. Tampilkan status sedang memproses
                    document.getElementById('verify-modal').classList.remove('hidden');
                    console.log("Wajah dikenali: " + user.nama);

                    // 3. Jalankan Absen Otomatis (Tentukan Masuk atau Pulang berdasarkan waktu)
                    await autoSubmitAbsen(user);
                }
            }
        }, 600);
    }

    async function autoSubmitAbsen(user) {
        // Tentukan tipe absen otomatis berdasarkan jam (Contoh: > 12:00 = PULANG)
        const jamSekarang = new Date().getHours();
        const tipeAbsen = (jamSekarang >= 12) ? "PULANG" : "MASUK";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "submit_absen",
                        nip: user.nip,
                        nama: user.nama,
                        tipe: tipeAbsen,
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    })
                });
                
                const result = await res.json();
                if (result.status === "success") {
                    // Simpan data login ke localStorage untuk halaman profil
                    localStorage.setItem('current_user', JSON.stringify(user));
                    // Matikan kamera
                    stream.getTracks().forEach(t => t.stop());
                    // Alihkan ke profil
                    window.location.href = 'profil.html';
                } else {
                    alert("Gagal Absen: " + result.message);
                    location.reload();
                }
            } catch (err) {
                alert("Gangguan Jaringan!");
                location.reload();
            }
        }, (err) => {
            alert("GPS harus aktif untuk absen otomatis!");
            location.reload();
        });
    }
</script>
</body>
</html>
