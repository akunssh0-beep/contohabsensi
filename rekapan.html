<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Bulanan - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .excel-table { border-collapse: collapse; width: 100%; background: white; font-size: 11px; }
        .excel-table th { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; text-transform: uppercase; color: #64748b; font-weight: 900; }
        .excel-table td { border: 1px solid #e2e8f0; padding: 8px 10px; color: #1e293b; }
        .excel-table tr:nth-child(even) { background: #fcfcfc; }
        @media print { .no-print { display: none; } body { background: white; } .glass-card { box-shadow: none; border: none; } }
    </style>
</head>
<body class="pb-10">

    <header class="bg-slate-900 text-white p-6 no-print">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='dasbodadmin.html'" class="text-white/50 hover:text-white">✕</button>
                <h1 class="font-black text-xl tracking-tighter uppercase italic">Rekapitulasi Presensi</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="exportExcel()" class="bg-green-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95">Ekspor Excel</button>
                <button onclick="window.print()" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95">Cetak PDF</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 flex flex-wrap gap-4 items-end no-print">
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-2 ml-2">Pilih Bulan</label>
                <select id="filter-bulan" class="bg-slate-50 border-none px-4 py-3 rounded-xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="01">Januari</option><option value="02">Februari</option>
                    <option value="03">Maret</option><option value="04">April</option>
                    <option value="05">Mei</option><option value="06">Juni</option>
                    <option value="07">Juli</option><option value="08">Agustus</option>
                    <option value="09">September</option><option value="10">Oktober</option>
                    <option value="11">November</option><option value="12">Desember</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-2 ml-2">Tahun</label>
                <select id="filter-tahun" class="bg-slate-50 border-none px-4 py-3 rounded-xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="2025">2025</option><option value="2026" selected>2026</option>
                </select>
            </div>
            <button onclick="loadRekap()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] active:scale-95">Tampilkan Data</button>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl overflow-hidden">
            <div class="text-center mb-8">
                <h2 class="font-black text-2xl text-slate-800 uppercase tracking-tighter">Laporan Kehadiran Pegawai</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">UPTD Puskesmas Sampanahan</p>
                <p id="periode-label" class="text-blue-600 text-[11px] font-black mt-2 uppercase tracking-widest">-</p>
            </div>

            <div class="overflow-x-auto">
                <table class="excel-table" id="table-rekap">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NIP</th>
                            <th>Nama Petugas</th>
                            <th>Tanggal</th>
                            <th>Jam Masuk</th>
                            <th>Jam Pulang</th>
                            <th>Ket/Status</th>
                        </tr>
                    </thead>
                    <tbody id="rekap-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";

        async function loadRekap() {
            const bulan = document.getElementById('filter-bulan').value;
            const tahun = document.getElementById('filter-tahun').value;
            const body = document.getElementById('rekap-body');
            
            document.getElementById('periode-label').innerText = `Periode: ${bulan} / ${tahun}`;
            body.innerHTML = '<tr><td colspan="7" class="text-center py-10">Memproses Data...</td></tr>';

            try {
                // Mengambil Log dari Google Sheets
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_logs" }) });
                const logs = await res.json();
                
                // Filter berdasarkan bulan dan tahun
                const filteredData = logs.slice(1).filter(log => {
                    const dateParts = log[0].split('/'); // Asumsi format tgl: DD/MM/YYYY
                    return dateParts[1] === bulan && dateParts[2] === tahun;
                });

                if(filteredData.length === 0) {
                    body.innerHTML = '<tr><td colspan="7" class="text-center py-10 font-bold text-slate-400 uppercase">Tidak ada data untuk periode ini</td></tr>';
                    return;
                }

                body.innerHTML = filteredData.map((log, index) => `
                    <tr>
                        <td class="text-center">${index + 1}</td>
                        <td class="font-bold">${log[2]}</td>
                        <td class="font-black">${log[3]}</td>
                        <td class="text-center">${log[0]}</td>
                        <td class="text-center font-bold text-green-600">${log[1]}</td>
                        <td class="text-center font-bold text-blue-600">${log[6] || '-'}</td>
                        <td class="text-center"><span class="text-[9px] font-black">${log[4]}</span></td>
                    </tr>
                `).join('');

            } catch (e) {
                body.innerHTML = '<tr><td colspan="7" class="text-center py-10 text-red-500">Gagal Memuat Database</td></tr>';
            }
        }

        function exportExcel() {
            const table = document.getElementById("table-rekap");
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].cells;
                for (let j = 0; j < cols.length; j++) row.push(cols[j].innerText);
                csv.push(row.join(","));
            }
            const csvFile = new Blob([csv.join("\n")], { type: "text/csv" });
            const downloadLink = document.createElement("a");
            downloadLink.download = `Rekap_Puskesmas_${document.getElementById('filter-bulan').value}_${document.getElementById('filter-tahun').value}.csv`;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
        }

        // Jalankan saat pertama dimuat
        window.onload = () => {
            const now = new Date();
            document.getElementById('filter-bulan').value = String(now.getMonth() + 1).padStart(2, '0');
            loadRekap();
        };
    </script>
</body>
</html>
