<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pegawai - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .profile-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .active-scale:active { transform: scale(0.95); }
        .status-badge { @apply text-[10px] font-black uppercase px-3 py-1 rounded-full; }
    </style>
</head>
<body class="pb-10">

    <div class="profile-gradient h-48 w-full relative">
        <button onclick="window.location.href='index.html'" class="absolute top-6 left-6 text-white opacity-60 hover:opacity-100">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        </button>
    </div>

    <div class="px-6 -mt-20">
        <div class="glass-card rounded-[3rem] p-8 flex flex-col items-center text-center shadow-2xl shadow-slate-200">
            <div class="h-28 w-28 rounded-full border-4 border-white shadow-xl overflow-hidden -mt-20 bg-slate-200">
                <img id="user-photo" src="" class="h-full w-full object-cover">
            </div>
            <h1 id="user-name" class="font-black text-2xl text-slate-800 uppercase tracking-tighter italic mt-4 italic">Nama Pegawai</h1>
            <p id="user-nip" class="text-[10px] font-black text-slate-400 tracking-[0.2em] uppercase">NIP: 000000000</p>
            
            <div class="w-full h-[1px] bg-slate-100 my-6"></div>
            
            <button onclick="logout()" class="active-scale bg-red-50 px-6 py-2 rounded-full text-red-500 text-[10px] font-black uppercase tracking-widest border border-red-100">
                Keluar Profil
            </button>
        </div>

        <div class="mt-10 mb-4 flex justify-between items-end px-2">
            <h3 class="font-black text-slate-800 uppercase tracking-tighter text-lg italic italic">Riwayat Hari Ini</h3>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Sync</span>
        </div>

        <div id="log-container" class="space-y-3">
            <p class="text-center py-10 text-slate-400 text-xs italic">Memuat riwayat...</p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('user-name').innerText = user.nama;
            document.getElementById('user-nip').innerText = "NIP: " + user.nip;
            if(user.foto) document.getElementById('user-photo').src = user.foto;
            
            loadUserLogs(user.nip);
        };

        async function loadUserLogs(nip) {
            const container = document.getElementById('log-container');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "get_user_logs", nip: nip })
                });
                const logs = await response.json();

                if (logs.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-slate-400 text-xs italic">Belum ada riwayat absensi.</div>`;
                    return;
                }

                container.innerHTML = logs.map(item => `
                    <div class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm">
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${item.jam} | ${item.tanggal}</p>
                            <p class="font-bold text-slate-700 text-sm italic">Presensi ${item.tipe}</p>
                        </div>
                        <span class="status-badge ${item.status === 'TEPAT WAKTU' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            ${item.status}
                        </span>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-center py-10 text-red-400 text-xs italic">Gagal sinkronisasi data.</p>`;
            }
        }

        function logout() {
            if(confirm("Apakah Anda ingin keluar dari profil ini?")) {
                localStorage.removeItem('current_user');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
