<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; user-select: none; }
        .glass-header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .stat-card { @apply bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 transition-all; }
        .log-row { @apply flex justify-between items-center p-4 bg-white rounded-2xl border border-slate-50 mb-2 shadow-sm; }
        .badge-masuk { @apply bg-green-50 text-green-600 text-[8px] font-black px-2 py-1 rounded-md uppercase; }
        .badge-terlambat { @apply bg-red-50 text-red-600 text-[8px] font-black px-2 py-1 rounded-md uppercase; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="glass-header text-white p-8 rounded-b-[3rem] shadow-2xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black text-2xl tracking-tighter uppercase italic">Admin Panel</h1>
                <p class="text-[9px] opacity-60 font-black uppercase tracking-[0.2em] mt-1">UPTD Puskesmas Sampanahan</p>
            </div>
            <button onclick="window.location.href='index.html'" class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-xl">🏠</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 -mt-8 space-y-6">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="stat-card">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Pegawai</p>
                <h2 id="stat-total" class="font-black text-2xl text-slate-800">-</h2>
            </div>
            <div class="stat-card border-l-4 border-l-green-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Hadir Tepat</p>
                <h2 id="stat-tepat" class="font-black text-2xl text-green-600">-</h2>
            </div>
            <div class="stat-card border-l-4 border-l-red-500">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Terlambat</p>
                <h2 id="stat-telat" class="font-black text-2xl text-red-600">-</h2>
            </div>
            <div class="stat-card">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Belum Absen</p>
                <h2 id="stat-belum" class="font-black text-2xl text-slate-400">-</h2>
            </div>
        </div>

        <section>
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Log Kehadiran Hari Ini</h3>
                <button onclick="loadAdminData()" class="text-[9px] font-black text-blue-600 uppercase tracking-widest">Refresh Data</button>
            </div>
            
            <div id="admin-log-container" class="space-y-2">
                <div class="animate-pulse h-16 bg-slate-200 rounded-2xl w-full"></div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="window.location.href='daftarpetugas.html'" class="bg-blue-600 text-white p-6 rounded-[2rem] flex items-center justify-between shadow-xl shadow-blue-100 active:scale-95 transition-all">
                <div class="text-left">
                    <h4 class="font-black text-sm uppercase">Registrasi Petugas</h4>
                    <p class="text-[9px] opacity-70 font-bold uppercase mt-1">Tambah NIP & Nama Baru</p>
                </div>
                <span class="text-2xl">👤</span>
            </button>
            <button onclick="window.location.href='setting.html'" class="bg-slate-800 text-white p-6 rounded-[2rem] flex items-center justify-between shadow-xl shadow-slate-100 active:scale-95 transition-all">
                <div class="text-left">
                    <h4 class="font-black text-sm uppercase">Sistem Setting</h4>
                    <p class="text-[9px] opacity-70 font-bold uppercase mt-1">GPS & Konfigurasi API</p>
                </div>
                <span class="text-2xl">⚙️</span>
            </button>
        </section>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";

        window.onload = () => {
            loadAdminData();
        };

        async function loadAdminData() {
            const container = document.getElementById('admin-log-container');
            
            try {
                // Mengambil Log Kehadiran
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_logs" }) });
                const logs = await res.json();
                
                // Mengambil Data Pegawai untuk Statistik
                const resPegawai = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_pegawai" }) });
                const pegawai = await resPegawai.json();

                // Update Statistik Ringkas
                const totalPegawai = pegawai.length;
                const totalHadir = logs.filter(l => l[4] === "TEPAT WAKTU" || l[4] === "TERLAMBAT").length;
                const telat = logs.filter(l => l[4] === "TERLAMBAT").length;
                const tepat = logs.filter(l => l[4] === "TEPAT WAKTU").length;

                document.getElementById('stat-total').innerText = totalPegawai;
                document.getElementById('stat-tepat').innerText = tepat;
                document.getElementById('stat-telat').innerText = telat;
                document.getElementById('stat-belum').innerText = totalPegawai - totalHadir;

                // Render Logs
                container.innerHTML = logs.slice(1, 20).map(log => `
                    <div class="log-row">
                        <div class="flex flex-col">
                            <span class="font-black text-slate-800 text-[11px] tracking-tight uppercase italic">${log[3]}</span>
                            <span class="text-[8px] text-slate-400 font-bold uppercase mt-0.5">${log[0]} | ${log[1]}</span>
                        </div>
                        <div class="text-right">
                            <span class="${log[4] === 'TEPAT WAKTU' ? 'badge-masuk' : 'badge-terlambat'}">${log[4]}</span>
                            <p class="text-[8px] text-slate-300 font-black mt-1">${log[5]}</p>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                container.innerHTML = "<p class='text-center py-10 text-red-500 font-black text-[10px] uppercase'>Gagal Memuat Data Cloud</p>";
            }
        }
    </script>
</body>
</html>
