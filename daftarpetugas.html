<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Petugas - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; user-select: none; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .input-field { @apply w-full bg-slate-50 border-none px-5 py-4 rounded-2xl font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm mb-4; }
        .label-style { @apply text-[10px] font-black text-slate-400 uppercase ml-4 mb-2 block tracking-widest; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounceIn { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="pb-10">

    <header class="p-6">
        <button onclick="window.location.href='index.html'" class="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-slate-400 mb-4 active:scale-90 transition-all">
            ✕
        </button>
        <h1 class="font-black text-slate-800 text-2xl tracking-tighter uppercase italic">Registrasi Petugas</h1>
        <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em]">UPTD Puskesmas Sampanahan</p>
    </header>

    <main class="max-w-md mx-auto p-6">
        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl">
            <label class="label-style">Nomor Induk Pegawai (NIP)</label>
            <input type="number" id="reg-nip" placeholder="Masukkan NIP..." class="input-field">

            <label class="label-style">Nama Lengkap Petugas</label>
            <input type="text" id="reg-nama" placeholder="Masukkan Nama Lengkap..." class="input-field">

            <button id="btn-simpan" onclick="prosesSimpan()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-blue-100 active:scale-95 transition-all mt-4">
                Simpan Data
            </button>
        </div>
    </main>

    <div id="modal-face" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6">
        <div class="glass-card w-full max-w-sm rounded-[3rem] p-8 text-center shadow-2xl animate-bounceIn">
            <div class="w-20 h-20 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">✨</div>
            <h3 class="font-black text-slate-800 text-xl tracking-tighter uppercase mb-2">Selangkah Lagi!</h3>
            <p class="text-slate-500 text-[11px] leading-relaxed mb-8 font-medium italic">Data petugas berhasil disimpan. Daftarkan wajah sekarang agar bisa absen menggunakan Face AI?</p>
            
            <div class="space-y-3">
                <button onclick="daftarWajahSekarang()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-100 active:scale-95">Daftar Wajah Sekarang</button>
                <button type="button" onclick="finishLater()" class="w-full bg-slate-100 text-slate-400 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">
                    Nanti Saja
                </button>
            </div>
        </div>
    </div>

    <script>
        // API URL Google Apps Script yang kamu gunakan
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec"; 

        async function prosesSimpan() {
            const nip = document.getElementById('reg-nip').value;
            const nama = document.getElementById('reg-nama').value;
            const btn = document.getElementById('btn-simpan');

            if (!nip || !nama) {
                alert("Harap isi NIP dan Nama!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "MENYIMPAN DATA...";

            try {
                // Kirim data ke Google Sheets melalui GAS
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk GAS web app
                    body: JSON.stringify({ 
                        action: "register_data_only", 
                        nip: nip, 
                        nama: nama 
                    })
                });

                // Simpan data di localStorage untuk digunakan di halaman registrasi wajah
                localStorage.setItem('temp_reg_user', JSON.stringify({ nip, nama }));

                // Tampilkan Modal Pendaftaran Wajah
                document.getElementById('modal-face').classList.remove('hidden');
            } catch (err) {
                alert("Terjadi kesalahan koneksi. Pastikan jaringan Barokah Net stabil.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SIMPAN DATA";
            }
        }

        // Fungsi untuk tombol "Nanti Saja"
        function finishLater() {
            localStorage.removeItem('temp_reg_user');
            window.location.replace('index.html');
        }

        // Fungsi untuk tombol "Daftar Wajah Sekarang"
        function daftarWajahSekarang() {
            // Mengarahkan ke index.html dengan parameter mode registrasi
            window.location.href = 'index.html?mode=registrasi';
        }
    </script>
</body>
</html>
